<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة - الاقتراحات والشكاوى</title>
  <meta name="description" content="لوحة تحكم إدارة الاقتراحات والشكاوى" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>" />

</head>
<body>
  <!-- Auth Gate -->
  <div class="auth-gate" id="authGate">
    <div class="glass auth-card">
      <img src="logo.png" alt="الشعار" class="logo" />
      <h2>لوحة الإدارة</h2>
      <p>يرجى إدخال رمز الدخول للوصول إلى لوحة التحكم</p>
      <input type="password" class="auth-input" id="accessCode" placeholder="••••••" maxlength="20" onkeydown="if(event.key==='Enter')checkAccess()" />
      <div id="authError" class="auth-error"></div>
      <button class="btn btn-primary" onclick="checkAccess()" style="width:100%;margin-top:16px">
        دخول
      </button>
    </div>
  </div>

  <!-- Admin Content -->
  <div class="admin-page" id="adminContent" style="display:none">
    <div class="animated-bg">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div class="admin-header">
      <div class="admin-header-inner">
        <div style="display:flex;align-items:center;gap:12px">
          <img src="logo.png" alt="الشعار" class="logo" />
          <span class="admin-header-title">لوحة الإدارة</span>
        </div>
        <button class="btn btn-ghost" onclick="logout()">
          تسجيل خروج
        </button>
      </div>
    </div>

    <main class="admin-main">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card total">
          <div class="stat-icon">📊</div>
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">المجموع الكلي</div>
        </div>
        <div class="stat-card complaints">
          <div class="stat-icon">⚠️</div>
          <div class="stat-number" id="statComplaints">0</div>
          <div class="stat-label">الشكاوى</div>
        </div>
        <div class="stat-card suggestions">
          <div class="stat-icon">💡</div>
          <div class="stat-number" id="statSuggestions">0</div>
          <div class="stat-label">الاقتراحات</div>
        </div>
      </div>

      <!-- Export Actions -->
      <div class="export-bar" id="exportBar">
        <button class="btn btn-primary" onclick="exportPDF('all')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          PDF للكل
        </button>
        <button class="btn btn-secondary export-complaint" onclick="exportPDF(1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          PDF الشكاوى
        </button>
        <button class="btn btn-secondary export-suggestion" onclick="exportPDF(2)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          PDF الاقتراحات
        </button>
        <button class="btn btn-secondary" onclick="printReport('all')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          طباعة
        </button>
      </div>

      <!-- Filters -->
      <div class="filters-bar" id="filtersBar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">الكل</button>
        <button class="filter-btn" data-filter="1" onclick="setFilter('1')">الشكاوى</button>
        <button class="filter-btn" data-filter="2" onclick="setFilter('2')">الاقتراحات</button>
      </div>

      <!-- Submissions -->
      <div id="submissionsContainer">
        <div class="loading-state" id="loadingState">
          <div class="spinner spinner-lg" style="margin:0 auto 16px"></div>
          <p style="color:var(--text-muted)">جاري تحميل البيانات...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Hidden Report Container for PDF/Print -->
  <div id="reportContainer" style="display:none"></div>

  <script src="js/config.js"></script>
  <script>
    const ADMIN_CODE = 'admin123';
    let allFeeds = [];
    let currentFilter = 'all';

    // Auto-login check
    if (localStorage.getItem('admin_logged_in') === 'true') {
      showAdmin();
    }

    function showAdmin() {
      document.getElementById('authGate').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadFeeds();
    }

    function checkAccess() {
      const code = document.getElementById('accessCode').value;
      const errorEl = document.getElementById('authError');
      if (code === ADMIN_CODE) {
        localStorage.setItem('admin_logged_in', 'true');
        showAdmin();
      } else {
        errorEl.textContent = '❌ رمز الدخول غير صحيح';
        setTimeout(() => errorEl.textContent = '', 3000);
      }
    }

    function logout() {
      localStorage.removeItem('admin_logged_in');
      document.getElementById('authGate').style.display = 'flex';
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('accessCode').value = '';
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(el => {
        el.classList.toggle('active', el.dataset.filter === filter);
      });
      renderSubmissions();
    }

    async function loadFeeds() {
      const container = document.getElementById('submissionsContainer');
      container.innerHTML = `
        <div class="loading-state">
          <div class="spinner spinner-lg" style="margin:0 auto 16px"></div>
          <p style="color:var(--text-muted)">جاري تحميل البيانات...</p>
        </div>
      `;

      try {
        const result = await supabaseRPC('get_all_feeds', { p_type: null });
        if (result.code === 200) {
          allFeeds = result.data || [];
          renderStats();
          renderSubmissions();
        } else {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>خطأ في تحميل البيانات</h3><p>${result.message || 'حاول مرة أخرى'}</p></div>`;
        }
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>تعذر الاتصال بالخادم</h3><p>تحقق من اتصالك بالإنترنت وحاول مرة أخرى</p></div>`;
      }
    }

    function renderStats() {
      const total = allFeeds.length;
      const complaints = allFeeds.filter(f => f.type === 1).length;
      const suggestions = allFeeds.filter(f => f.type === 2).length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statComplaints').textContent = complaints;
      document.getElementById('statSuggestions').textContent = suggestions;
    }

    function renderSubmissions() {
      const container = document.getElementById('submissionsContainer');
      let filtered = allFeeds;
      if (currentFilter !== 'all') {
        filtered = allFeeds.filter(f => f.type === parseInt(currentFilter));
      }

      if (filtered.length === 0) {
        const emptyMsg = currentFilter === 'all' ? 'لا توجد أي مشاركات بعد' : (currentFilter === '1' ? 'لا توجد شكاوى' : 'لا توجد اقتراحات');
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>${emptyMsg}</h3>
            <p>عندما يقوم المستخدمون بإرسال مشاركات، ستظهر هنا</p>
          </div>
        `;
        return;
      }

      container.innerHTML = '<div class="submissions-list" id="submissionsList"></div>';
      const list = document.getElementById('submissionsList');

      filtered.forEach(feed => {
        const date = new Date(feed.created_at).toLocaleDateString('ar-SA', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        const typeLabel = feed.type === 1 ? 'شكوى' : 'اقتراح';
        const badgeClass = feed.type === 1 ? 'badge-complaint' : 'badge-suggestion';
        const badgeIcon = feed.type === 1 ? '⚠️' : '💡';
        const shortId = feed.id ? feed.id.substring(0, 8) + '...' : '';

        const card = document.createElement('div');
        card.className = 'submission-card';
        card.innerHTML = `
          <div class="submission-header">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="badge ${badgeClass}">${badgeIcon} ${typeLabel}</span>
              <span class="submission-date">📅 ${date}</span>
            </div>
            <span class="submission-id">🆔 ${shortId}</span>
          </div>
          <div class="submission-content">${escapeHtml(feed.content)}</div>
        `;
        list.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== PDF & PRINT ====================

    function getFilteredData(type) {
      if (type === 'all') return allFeeds;
      return allFeeds.filter(f => f.type === type);
    }

    function getReportTitle(type) {
      if (type === 'all') return 'تقرير الاقتراحات والشكاوى';
      if (type === 1) return 'تقرير الشكاوى';
      if (type === 2) return 'تقرير الاقتراحات';
      return '';
    }

    function getReportFileName(type) {
      const date = new Date().toISOString().slice(0, 10);
      if (type === 'all') return `تقرير_الاقتراحات_والشكاوى_${date}`;
      if (type === 1) return `تقرير_الشكاوى_${date}`;
      if (type === 2) return `تقرير_الاقتراحات_${date}`;
      return `تقرير_${date}`;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('ar-SA', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function buildReportHTML(type) {
      const data = getFilteredData(type);
      const title = getReportTitle(type);
      const now = new Date();
      const dateStr = formatDate(now);

      const complaints = data.filter(f => f.type === 1).length;
      const suggestions = data.filter(f => f.type === 2).length;

      let rows = '';
      if (data.length === 0) {
        rows = '<tr><td colspan="4" style="text-align:center;padding:40px;color:#888">لا توجد بيانات لعرضها</td></tr>';
      } else {
        data.forEach((feed, i) => {
          const typeTxt = feed.type === 1 ? 'شكوى' : 'اقتراح';
          const typeColor = feed.type === 1 ? '#ef4444' : '#10b981';
          const content = escapeHtml(feed.content);
          rows += `
            <tr>
              <td style="text-align:center;padding:12px 10px;border-bottom:1px solid #eee;font-weight:600;color:#555">${i + 1}</td>
              <td style="padding:12px 10px;border-bottom:1px solid #eee;color:#333;line-height:1.7">${content}</td>
              <td style="text-align:center;padding:12px 10px;border-bottom:1px solid #eee">
                <span style="display:inline-block;padding:4px 14px;border-radius:100px;font-size:0.82rem;font-weight:600;background:${typeColor}15;color:${typeColor}">${typeTxt}</span>
              </td>
              <td style="text-align:center;padding:12px 10px;border-bottom:1px solid #eee;color:#777;font-size:0.85rem;white-space:nowrap">${formatDate(feed.created_at)}</td>
            </tr>
          `;
        });
      }

      return `
        <!DOCTYPE html>
        <html dir="rtl">
        <head>
          <meta charset="UTF-8" />
          <title>${title}</title>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: 'Cairo', 'Segoe UI', sans-serif; direction: rtl; background: #fff; color: #222; }
            .report { max-width: 210mm; margin: 0 auto; padding: 30px 35px; }
            .report-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 3px solid #f59e0b; margin-bottom: 24px; }
            .report-logo { height: 50px; }
            .report-title-area { text-align: left; }
            .report-title { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; }
            .report-date { font-size: 0.85rem; color: #888; margin-top: 4px; }
            .report-summary { display: flex; gap: 16px; margin-bottom: 28px; }
            .summary-item { flex: 1; padding: 16px 20px; border-radius: 10px; border: 1px solid #e5e7eb; text-align: center; background: #fafafa; }
            .summary-item .num { font-size: 1.8rem; font-weight: 800; line-height: 1.3; }
            .summary-item .lbl { font-size: 0.85rem; color: #666; font-weight: 500; }
            .summary-item.total .num { color: #f59e0b; }
            .summary-item.complaints .num { color: #ef4444; }
            .summary-item.suggestions .num { color: #10b981; }
            table { width: 100%; border-collapse: collapse; margin-top: 8px; }
            th { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; padding: 14px 10px; font-weight: 600; font-size: 0.9rem; }
            th:first-child { border-radius: 0 8px 8px 0; }
            th:last-child { border-radius: 8px 0 0 8px; }
            tr:nth-child(even) { background: #f9fafb; }
            .report-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e5e7eb; text-align: center; font-size: 0.8rem; color: #aaa; }
            @media print {
              body { padding: 0; }
              .report { padding: 20px; }
              th { background: #f59e0b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              .summary-item { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              tr:nth-child(even) { background: #f9fafb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            }
          </style>
        </head>
        <body>
          <div class="report">
            <div class="report-header">
              <img src="logo.png" class="report-logo" />
              <div class="report-title-area">
                <div class="report-title">${title}</div>
                <div class="report-date">تاريخ التقرير: ${dateStr}</div>
              </div>
            </div>
            <div class="report-summary">
              <div class="summary-item total"><div class="num">${data.length}</div><div class="lbl">المجموع الكلي</div></div>
              <div class="summary-item complaints"><div class="num">${complaints}</div><div class="lbl">الشكاوى</div></div>
              <div class="summary-item suggestions"><div class="num">${suggestions}</div><div class="lbl">الاقتراحات</div></div>
            </div>
            <table>
              <thead><tr><th style="width:50px">#</th><th>المحتوى</th><th style="width:100px">النوع</th><th style="width:160px">التاريخ</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="report-footer">تم إنشاء هذا التقرير تلقائياً - جميع الحقوق محفوظة © ${now.getFullYear()}</div>
          </div>
        </body>
        </html>
      `;
    }

    function exportPDF(type) {
      var container = document.getElementById('reportContainer');
      container.innerHTML = buildReportHTML(type);
      container.style.display = 'block';
      setTimeout(function () {
        window.print();
        container.style.display = 'none';
        container.innerHTML = '';
      }, 500);
    }

    function printReport(type) {
      const container = document.getElementById('reportContainer');
      container.innerHTML = buildReportHTML(type);
      container.style.display = 'block';
      setTimeout(() => {
        window.print();
        container.style.display = 'none';
        container.innerHTML = '';
      }, 300);
    }
  </script>
</body>
</html>
