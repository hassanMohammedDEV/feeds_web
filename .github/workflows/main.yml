name: Sada Supabase Keep Alive

on:
  schedule:
    # يعمل يومياً الساعة 12 منتصف الليل بتوقيت UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # للتشغيل اليدوي عند الحاجة

# تفعيل البيئة الجديدة إجبارياً على مستوى السيرفر بالكامل
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# تصريح صريح للأكشن بالكتابة
permissions:
  contents: write

jobs:
  ping_and_keep_alive:
    runs-on: ubuntu-latest

    steps:
    # 1. عمل Clone للمستودع
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. استدعاء دالة قاعدة بيانات سوبابيس (RPC عبر REST API مباشر)
    - name: Call Supabase REST API
      run: |
        curl -X POST "${{ secrets.SADA_SUPABASE_URL }}/rest/v1/rpc/get_latest_feed" \
        -H "apikey: ${{ secrets.SADA_SUPABASE_ANON_KEY }}" \
        -H "Authorization: Bearer ${{ secrets.SADA_SUPABASE_ANON_KEY }}" \
        -H "Content-Type: application/json"

    # 3. تحديث ملف بسيط لإبقاء المستودع نشطاً بنظر GitHub
    - name: Keep GitHub Action Alive (Prevent 60-day shutdown)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # تحديث الوقت داخل الملف
        echo "Last ping: $(date)" > keep_alive.txt
        git add keep_alive.txt
        
        # عمل الكوميت والرفع فقط في حال وجود تغيير حقيقي لمنع الـ Exit Code 2
        if ! git diff-index --quiet HEAD --; then
          git commit -m "chore: automated keep-alive ping [skip ci]"
          git push origin HEAD
        fi
